name: Build Shield Launcher PT-BR

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout com submódulos
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Instalar Visual Studio Build Tools
      uses: microsoft/setup-msbuild@v2

    - name: Gerar solução com Premake5
      run: |
        tools\premake5 vs2022

    - name: Compilar em Release
      run: |
        msbuild build\shield-launcher.sln /p:Configuration=Release /p:Platform=x64

    - name: Upload do EXE
      uses: actions/upload-artifact@v4
      with:
        name: shield-launcher-PTBR
        path: build\bin\x64\Release\shield_launcher.exe
